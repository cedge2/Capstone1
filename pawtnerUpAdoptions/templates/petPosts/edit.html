{% extends "base.html" %}

{% block title %}Edit Adoption Post{% endblock %}

{% block content %}

<h1>Edit Adoption Post</h1>

<form method="POST" action="/pets/{{ pet.id }}/edit">

  <div class="form-group row">
    <label for="title" class="col-sm-2 col-form-label">Title</label>
    <div class="col-sm-10">
      <input class="form-control" id="title" name="title" value="{{ pet.name }}">
    </div>
  </div>

  <div class="form-group row">
    <label for="content" class="col-sm-2 col-form-label">Pet Description</label>
    <div class="col-sm-10">
      <textarea class="form-control"
                id="content"
                name="content">{{ pet.description }}</textarea>
    </div>
  </div>

  <div class="form-group row">
    <label for="breed" class="col-sm-2 col-form-label">Breed</label>
    <div class="col-sm-10">
      <input class="form-control" id="breed" name="breed" value="{{ pet.breed }}">
    </div>
  </div>

  <div class="form-group row">
    <label for="age" class="col-sm-2 col-form-label">Age</label>
    <div class="col-sm-10">
      <input class="form-control" id="age" name="age" value="{{ pet.age }}">
    </div>
  </div>

  <div class="form-group row">
    <label for="location" class="col-sm-2 col-form-label">Location</label>
    <div class="col-sm-10">
      <input class="form-control" id="location" name="location" value="{{ pet.location }}">
    </div>
  </div>

  <div class="form-check">
    {% for tag in tags %}
    <div>
      <input class="form-check-input"
             type="checkbox"
             value="{{ tag.id }}"
             id="tag_{{ tag.id }}"
             {% if tag in pet.tags %}checked{% endif %}
             name="tags">
      <label class="form-check-label" for="tag_{{ tag.id }}">
        {{ tag.name }}
      </label>
    </div>
    {% endfor %}
  </div>

  <div class="form-group row">
    <div class="ml-auto mr-3">
      <a href="/pets/{{ pet.id }}" class="btn btn-outline-info">
        Cancel
      </a>
      <button type="submit" class="btn btn-success">
        Edit
      </button>
    </div>
  </div>

</form>

{% endblock %}
